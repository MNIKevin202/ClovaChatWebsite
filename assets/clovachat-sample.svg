<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Sample ClovaChat desktop interface</title>
  <desc id="desc">A fictional ClovaChat interface mockup with sample channels, messages, stream data, and controls.</desc>
  <defs>
    <linearGradient id="appBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151b22"/>
      <stop offset="1" stop-color="#0b1016"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#40dce8"/>
      <stop offset="1" stop-color="#9c66ff"/>
    </linearGradient>
    <linearGradient id="stream" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7d4dff"/>
      <stop offset="0.45" stop-color="#35c6d4"/>
      <stop offset="1" stop-color="#10151c"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.27 0 0 0 0 0.89 0 0 0 0 0.95 0 0 0 .55 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <style>
      .bg{fill:url(#appBg)}
      .panel{fill:#1b222a;stroke:#313b46;stroke-width:2}
      .panel2{fill:#151b22;stroke:#2a333d;stroke-width:2}
      .card{fill:#202832;stroke:#37424e;stroke-width:2}
      .muted{fill:#a9a39b}
      .text{fill:#f4f0e8}
      .cyan{fill:#42d9e6}
      .green{fill:#7ddf9d}
      .purple{fill:#a06cff}
      .red{fill:#ff827b}
      .label{fill:#8ceeb0;font-weight:800;font-size:20px}
      .small{font-size:20px}
      .body{font-size:24px}
      .title{font-size:32px;font-weight:900}
      .micro{font-size:16px}
      text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    </style>
  </defs>

  <rect class="bg" width="1600" height="1000" rx="26"/>
  <rect x="1" y="1" width="1598" height="998" rx="26" fill="none" stroke="#2c3640" stroke-width="2"/>

  <rect x="0" y="0" width="1600" height="76" rx="26" fill="#161c23"/>
  <rect x="0" y="52" width="1600" height="24" fill="#161c23"/>
  <rect x="34" y="22" width="120" height="32" rx="10" fill="#25123d" stroke="#8f58ff" filter="url(#glow)"/>
  <text x="50" y="44" class="text micro" font-weight="900">ClovaChat</text>
  <text x="228" y="45" class="muted micro" font-weight="800">Dashboard</text>
  <text x="382" y="45" class="cyan micro" font-weight="900">Streams/Chat</text>
  <text x="558" y="45" class="muted micro" font-weight="800">Bot</text>
  <text x="640" y="45" class="muted micro" font-weight="800">Commands</text>
  <text x="784" y="45" class="muted micro" font-weight="800">Popups</text>
  <text x="898" y="45" class="muted micro" font-weight="800">Timers</text>
  <text x="1010" y="45" class="muted micro" font-weight="800">Docs</text>
  <text x="1328" y="45" class="muted micro" font-weight="800">Settings</text>
  <text x="1490" y="45" class="muted micro" font-weight="800">v1.4</text>

  <rect x="0" y="76" width="298" height="924" fill="#131920" stroke="#2b343f" stroke-width="2"/>
  <text x="36" y="132" class="muted body" font-weight="900">CHANNELS</text>
  <rect x="36" y="164" width="198" height="52" rx="8" fill="#11171d" stroke="#3a4652"/>
  <text x="58" y="198" class="muted body">Add channel...</text>
  <rect x="246" y="164" width="74" height="52" rx="9" fill="#39bcca"/>
  <text x="268" y="198" fill="#071113" class="body" font-weight="900">Join</text>
  <rect x="36" y="254" width="252" height="54" rx="9" fill="#212932"/>
  <text x="62" y="290" class="text body" font-weight="900">Server</text>

  <g font-weight="900">
    <rect x="36" y="338" width="252" height="58" rx="9" fill="#1b222a"/>
    <circle cx="62" cy="367" r="8" class="green"/>
    <text x="82" y="376" class="text body">#sample_cafe</text>
    <rect x="242" y="351" width="34" height="30" rx="15" fill="#294735"/>
    <text x="252" y="373" class="green small">8</text>
    <rect x="36" y="410" width="252" height="58" rx="9" fill="#35aeba"/>
    <circle cx="62" cy="439" r="8" fill="#5b8e96"/>
    <text x="82" y="448" fill="#fff" class="body">#demo_lounge</text>
    <rect x="36" y="482" width="252" height="58" rx="9" fill="#171e25"/>
    <circle cx="62" cy="511" r="8" fill="#56616c"/>
    <text x="82" y="520" class="text body">#pixel_radio</text>
    <rect x="36" y="554" width="252" height="58" rx="9" fill="#171e25"/>
    <circle cx="62" cy="583" r="8" fill="#56616c"/>
    <text x="82" y="592" class="text body">#neon_lab</text>
    <rect x="36" y="626" width="252" height="58" rx="9" fill="#171e25"/>
    <circle cx="62" cy="655" r="8" fill="#56616c"/>
    <text x="82" y="664" class="text body">#aurora_test</text>
  </g>

  <rect x="322" y="96" width="782" height="820" rx="18" fill="#171e25" stroke="#2f3944" stroke-width="2"/>
  <text x="350" y="145" class="muted body" font-weight="900">SAMPLE STREAM LIVE</text>
  <rect x="360" y="170" width="702" height="360" rx="8" fill="url(#stream)"/>
  <path d="M360 432 C500 360, 590 440, 720 350 S960 292, 1062 360 L1062 530 L360 530 Z" fill="#0d1219" opacity=".55"/>
  <path d="M430 240 L520 214 L610 292 L720 218 L842 310 L972 246" fill="none" stroke="#ffffff" stroke-opacity=".22" stroke-width="8"/>
  <circle cx="874" cy="272" r="52" fill="none" stroke="#fff" stroke-opacity=".45" stroke-width="10"/>
  <polygon points="664,270 664,420 790,345" fill="#fff" opacity=".9"/>
  <rect x="884" y="196" width="94" height="34" rx="8" fill="#ff2020"/>
  <text x="904" y="221" fill="#fff" class="small" font-weight="950">LIVE</text>

  <text x="362" y="578" class="text title">demo_lounge</text>
  <text x="362" y="612" class="muted body">Playing a sample stream for 42 viewers</text>
  <rect x="360" y="660" width="104" height="44" rx="8" fill="#26313c" stroke="#3c4855"/>
  <text x="386" y="690" class="text small" font-weight="900">Wave</text>
  <rect x="480" y="660" width="132" height="44" rx="8" fill="#35bcca"/>
  <text x="508" y="690" fill="#071113" class="small" font-weight="950">Say Hello</text>
  <rect x="630" y="660" width="150" height="44" rx="8" fill="none" stroke="#ff827b" stroke-width="2"/>
  <text x="658" y="690" class="red small" font-weight="900">Leave Channel</text>

  <rect x="360" y="742" width="700" height="116" rx="12" fill="#1d252e" stroke="#3b4652"/>
  <circle cx="392" cy="785" r="11" class="green"/>
  <text x="416" y="793" class="green body" font-weight="900">Connected to Twitch</text>
  <rect x="382" y="818" width="188" height="28" rx="6" fill="#26313c"/>
  <text x="398" y="838" class="label micro">SERVER</text>
  <text x="478" y="838" class="text micro">Sample IRC</text>
  <rect x="588" y="818" width="144" height="28" rx="6" fill="#26313c"/>
  <text x="604" y="838" class="label micro">NICK</text>
  <text x="664" y="838" class="text micro">samplebot</text>
  <rect x="750" y="818" width="164" height="28" rx="6" fill="#26313c"/>
  <text x="766" y="838" class="label micro">CHANNELS</text>
  <text x="868" y="838" class="text micro">5 joined</text>
  <rect x="928" y="792" width="106" height="42" rx="8" fill="none" stroke="#ff827b"/>
  <text x="952" y="820" class="red small" font-weight="900">Disconnect</text>

  <rect x="1130" y="96" width="430" height="820" rx="18" fill="#171e25" stroke="#2f3944" stroke-width="2"/>
  <text x="1160" y="148" class="text title">#demo_lounge</text>
  <rect x="1344" y="118" width="86" height="36" rx="18" fill="#11171d" stroke="#303a45"/>
  <text x="1364" y="142" class="muted micro" font-weight="900">Live: Yes</text>
  <rect x="1444" y="118" width="94" height="36" rx="18" fill="#11171d" stroke="#303a45"/>
  <text x="1462" y="142" class="muted micro" font-weight="900">Users: 42</text>

  <rect x="1160" y="190" width="370" height="498" rx="14" fill="#1b222a"/>
  <g class="small">
    <text x="1192" y="250" class="purple" font-weight="900">SampleFan</text>
    <text x="1312" y="250" class="text">hello chat!</text>
    <text x="1192" y="304" class="cyan" font-weight="900">DemoMod</text>
    <text x="1292" y="304" class="text">timer is running</text>
    <text x="1192" y="358" class="green" font-weight="900">PixelGuest</text>
    <text x="1320" y="358" class="text">nice setup</text>
    <text x="1192" y="412" fill="#ffd36c" font-weight="900">TestViewer</text>
    <text x="1324" y="412" class="text">sample message</text>
  </g>
  <rect x="1160" y="724" width="58" height="48" rx="10" fill="#26313c"/>
  <text x="1180" y="755" class="text small">☺</text>
  <rect x="1238" y="724" width="198" height="48" rx="10" fill="#11171d" stroke="#34404c"/>
  <text x="1260" y="756" class="muted body">Message #demo...</text>
  <rect x="1452" y="724" width="78" height="48" rx="10" fill="#35bcca"/>
  <text x="1478" y="756" fill="#071113" class="body" font-weight="950">Send</text>
</svg>
